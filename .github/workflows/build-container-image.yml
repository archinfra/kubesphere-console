name: Build Console Container Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: Image tag. Defaults to the current ref name plus short SHA for branch builds.
        required: false
        default: ""
      platforms:
        description: Target platforms
        required: true
        default: linux/amd64,linux/arm64
  push:
    branches:
      - master
      - release-*
    tags:
      - "v*"
    paths:
      - ".github/workflows/build-container-image.yml"
      - "build/**"
      - "hack/**"
      - "locales/**"
      - "packages/**"
      - "scripts/**"
      - "server/**"
      - "package.json"
      - "yarn.lock"
      - "Makefile"

permissions:
  contents: read
  packages: write

env:
  IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY || 'ghcr.io' }}
  IMAGE_NAMESPACE: ${{ vars.CONSOLE_IMAGE_NAMESPACE || vars.IMAGE_NAMESPACE || github.repository }}
  IMAGE_NAME: ${{ vars.CONSOLE_IMAGE_NAME || 'ks-console' }}

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout console
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve image metadata
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          input_version="${{ inputs.version || '' }}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          elif [[ -n "${input_version}" ]]; then
            version="${input_version}"
          else
            safe_ref="$(echo "${GITHUB_REF_NAME}" | tr '/_' '--' | tr -cd 'A-Za-z0-9._-')"
            version="${safe_ref}-${GITHUB_SHA::7}"
          fi

          image="${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}"
          tags="${image}:${version}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tags="${tags}"$'\n'"${image}:latest"
          fi

          echo "version=${version}" >>"${GITHUB_OUTPUT}"
          echo "image=${image}" >>"${GITHUB_OUTPUT}"
          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >>"${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to image registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD || github.token }}

      - name: Build console output
        run: |
          make container-cross

      - name: Build and push console image
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.workspace }}
          file: build/Dockerfile.dapper
          platforms: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          labels: |
            org.opencontainers.image.title=ks-console
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Summary
        run: |
          echo "Published image:"
          echo "${{ steps.vars.outputs.tags }}"
